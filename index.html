<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vistara Group IPO</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif
}

body{
  background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a);
  color:#fff;
  overflow:hidden;
}

/* 🎉 BANNER */
.banner{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:linear-gradient(90deg,#facc15,#38bdf8,#f472b6);
  color:#000;
  padding:8px 20px;
  border-radius:30px;
  font-weight:700;
  font-size:16px;
  box-shadow:0 0 25px rgba(255,255,255,0.5);
  animation: glow 2s infinite alternate;
  z-index:10;
}

@keyframes glow{
  from{box-shadow:0 0 10px rgba(255,255,255,0.3)}
  to{box-shadow:0 0 30px rgba(255,255,255,1)}
}

.container{
  display:grid;
  grid-template-rows: 18% 10% 27% 45%;
  height:100vh;
  padding:20px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo img{
  height:140px;
  background:#020617;
  padding:6px;
  border-radius:10px;
  animation: floatLogo 4s ease-in-out infinite;
}

@keyframes floatLogo{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

.message{
  font-size:20px;
  color:#e2e8f0;
}

/* IPO TEXT */
.ipo-text{
  text-align:center;
  font-size:42px;
  font-weight:700;
  letter-spacing:2px;
  background:linear-gradient(90deg,#38bdf8,#facc15,#f472b6);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* COUNTDOWN */
.countdown{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:25px;
}

.box{
  background:rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  padding:25px;
  border-radius:18px;
  text-align:center;
  min-width:120px;
}

.value{font-size:36px;font-weight:bold}
.label{font-size:13px;opacity:0.7}

/* CLOCK */
.clock{
  position:relative;
  width:80px;
  height:80px;
  border:3px solid rgba(255,255,255,0.6);
  border-radius:50%;
  margin:auto;
}
.hand{
  position:absolute;
  width:2px;
  height:35px;
  background:#facc15;
  top:5px;
  left:50%;
  transform-origin:bottom;
}
.center-dot{
  position:absolute;
  width:8px;
  height:8px;
  background:#fff;
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

/* SLIDER */
.slider{
  position:relative;
  overflow:hidden;
  border-radius:20px;
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0;
  transition:1s;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:15px;
}
.slide.active{opacity:1}

.slide img{
  width:100%;
  max-width:380px;
  height:230px;
  object-fit:cover;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.title{
  position:absolute;
  bottom:12px;
  left:20px;
  font-size:22px;
}

/* 🎆 FIREWORK */
.firework{
  position:absolute;
  width:6px;
  height:6px;
  border-radius:50%;
  animation: explode 1.2s ease-out forwards;
}

@keyframes explode{
  to{
    transform:translate(var(--x),var(--y)) scale(0.5);
    opacity:0;
  }
}

/* ✨ SPARK */
.spark{
  position:absolute;
  width:3px;
  height:3px;
  background:white;
  border-radius:50%;
  animation: sparkFade 1s linear forwards;
}

@keyframes sparkFade{
  to{
    transform:translateY(20px);
    opacity:0;
  }
}

/* 🚀 ROCKET */
.rocket{
  position:absolute;
  bottom:-60px;
  width:4px;
  height:35px;
  background:linear-gradient(#fff,#facc15);
}

</style>
</head>

<body>

<div class="banner">🎉 Celebrating 7 Years of Excellence</div>

<div class="container">

  <div class="header">
    <div class="logo">
      <img src="img/logo3.png">
    </div>
    <div class="message">A New Era of Growth Begins</div>
  </div>

  <div class="ipo-text">VISTARA GROUP IPO 2032</div>

  <div class="countdown">
    <div class="box"><div id="d" class="value"></div><div class="label">Days</div></div>
    <div class="box"><div id="h" class="value"></div><div class="label">Hours</div></div>
    <div class="box"><div id="m" class="value"></div><div class="label">Minutes</div></div>

    <div class="box">
      <div class="clock">
        <div id="secondHand" class="hand"></div>
        <div class="center-dot"></div>
      </div>
      <div class="label">Seconds</div>
    </div>
  </div>

  <div class="slider">
    <div class="slide active">
      <img src="img/event1.JPG">
      <img src="img/event2.JPG">
      <img src="img/event3.JPG">
      <div class="title">Our Events</div>
    </div>

    <div class="slide">
      <img src="img/leadership2.JPG">
      <img src="img/leadership1.JPG">
      <img src="img/leadership3.JPG">
      <div class="title">Leadership</div>
    </div>

    <div class="slide">
      <img src="img/team1.jpeg">
      <img src="img/team3.jpeg">
      <img src="img/team2.jpeg">
      <div class="title">Our Team</div>
    </div>
  </div>

</div>

<script>
// COUNTDOWN
const target = new Date("Jan 1, 2032").getTime();

setInterval(()=>{
  const now=new Date();
  const gap=target-now.getTime();

  d.innerText=Math.floor(gap/(1000*60*60*24));
  h.innerText=Math.floor((gap%(1000*60*60*24))/(1000*60*60));
  m.innerText=Math.floor((gap%(1000*60*60))/(1000*60));

  let sec=now.getSeconds()+now.getMilliseconds()/1000;
  secondHand.style.transform=`rotate(${sec*6}deg)`;
},50);

// SLIDER
let slides=document.querySelectorAll('.slide');
let i=0;
setInterval(()=>{
  slides[i].classList.remove('active');
  i=(i+1)%slides.length;
  slides[i].classList.add('active');
},3500);

// COLORS
const colors = ["#facc15","#38bdf8","#f472b6","#4ade80","#fb7185","#a78bfa","#ffffff"];

// FIREWORK
function createFirework(x,y){
  for(let i=0;i<50;i++){
    let f=document.createElement('div');
    f.className='firework';

    let color = colors[Math.floor(Math.random()*colors.length)];
    f.style.background=color;

    f.style.left=x+'px';
    f.style.top=y+'px';

    f.style.setProperty('--x',(Math.random()*350-175)+'px');
    f.style.setProperty('--y',(Math.random()*350-175)+'px');

    document.body.appendChild(f);
    setTimeout(()=>f.remove(),1200);
  }
}

// 🚀 ROCKET WITH PERFECT BURST
function launchRocket(){
  let r=document.createElement('div');
  r.className='rocket';

  let startX = Math.random()*window.innerWidth;
  let explodeHeight = 150 + Math.random()*250;

  r.style.left = startX + "px";
  document.body.appendChild(r);

  let pos = 0;

  let interval = setInterval(()=>{
    pos += 8;
    r.style.bottom = pos + "px";

    // spark trail
    let spark=document.createElement('div');
    spark.className='spark';
    spark.style.left=startX+"px";
    spark.style.bottom=pos+"px";
    document.body.appendChild(spark);
    setTimeout(()=>spark.remove(),800);

    // BURST HERE (FIXED)
    if(pos >= explodeHeight){
      clearInterval(interval);

      createFirework(startX, window.innerHeight - explodeHeight);

      r.remove();
    }

  },30);
}

// LAUNCH LOOP
setInterval(()=>{
  launchRocket();
},900);

// RANDOM BURSTS
setInterval(()=>{
  createFirework(Math.random()*window.innerWidth,Math.random()*300);
},2000);

</script>

</body>
</html>
